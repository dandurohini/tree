<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PraRoz</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: url('https://png.pngtree.com/thumb_back/fh260/background/20230611/pngtree-single-tree-sits-on-the-grassy-hill-image_2967647.jpg') no-repeat center center/cover;
    height: 100vh;
    color: #fff;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
}

.logo {
    font-size: 28px;
    font-weight: bold;
    color: orange;
}

nav ul {
    display: flex;
    list-style: none;
}

nav ul li {
    margin: 0 15px;
}

nav ul li a {
    text-decoration: none;
    color: white;
    font-weight: bold;
}

nav ul li a:hover {
    color: orange;
}

.search-box {
    display: flex;
}

.search-box input {
    padding: 5px;
    border: none;
    outline: none;
}

.search-box button {
    background: orange;
    border: none;
    padding: 6px 12px;
    cursor: pointer;
    color: #fff;
}


.main {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 50px;
}

.content {
    max-width: 500px;
}

.content h1 {
    font-size: 50px;
    line-height: 1.2;
}

.content h1 span {
    color: orange;
}

.content p {
    margin: 20px 0;
    line-height: 1.6;
}

.join-btn {
    background: orange;
    border: none;
    padding: 10px 20px;
    color: #fff;
    cursor: pointer;
    border-radius: 5px;
}

.login-box h2 {
    background: #fff;
    color: orange;
    text-align: center;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    margin-bottom: 15px;
    padding: 10px;
    border: none;
    border-bottom: 1px solid orange;
    background: transparent;
    color: #fff;
}

.login-btn {
    width: 100%;
    padding: 10px;
    background: orange;
    border: none;
    color: #fff;
    cursor: pointer;
    border-radius: 5px;
}

.link {
    text-align: center;
    margin-top: 10px;
}

.link a {
    color: orange;
    text-decoration: none;
}

.liw {
    text-align: center;
    margin: 15px 0;
}

.icons {
    display: flex;
    justify-content: space-around;
}

.icons span {
    background: #fff;
    color: #000;
    padding: 8px;
    border-radius: 50%;
    cursor: pointer;
}
    </style>
</head>

<body>

   
    <header>
        <div class="logo">PraRoz</div>
        <nav>
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#">ABOUT</a></li>
                <li><a href="#">SERVICE</a></li>
                <li><a href="#">DESIGN</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
        </nav>

        <div class="search-box">
            <input type="text" placeholder="Type to Search">
            <button>Search</button>
        </div>
    </header>

    
    <section class="main">
        <div class="content">
            <h1>Web Design & <br><span>Development</span><br>Course</h1>
            <p>
                Web Design is a specialisation of the design stream. 
                They also use HTML, CSS, WYSIWYG editing software, 
                mark up validators etc., to create design elements.
            </p>
            <button class="join-btn">JOIN US</button>
        </div>

        <div class="login-box">
            <h2>Login Here</h2>
            <input type="email" placeholder="Enter Email Here">
            <input type="password" placeholder="Enter Password Here">
            <button class="login-btn">Login</button>

            <p class="link">
                Don't have an account?<br>
                <a href="#">Sign up here</a>
            </p>

            </div>
        </div>
    </section>

</body>
</html>
